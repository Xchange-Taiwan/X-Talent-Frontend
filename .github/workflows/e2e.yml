name: E2E (manual)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Target URL'
        required: false
        default: 'https://xtalentdev.vercel.app'

jobs:
  e2e:
    runs-on: ubuntu-latest
    name: Playwright E2E
    # Manual trigger only, never wired into branch protection — so a failure
    # here cannot block PR merge anyway. Let the run fail loudly so the result
    # is unambiguous in the Actions UI instead of always showing green.
    env:
      BASE_URL: ${{ inputs.base_url }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_DEV }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
