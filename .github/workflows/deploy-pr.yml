name: Deploy to Vercel (Pull Request Preview)

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  deploy-pr-preview:
    runs-on: ubuntu-latest
    name: Deploy PR Preview to Vercel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (preview)
        run: vercel pull --yes --environment=preview --token=${{ env.VERCEL_TOKEN }}

      # Single build: vercel build runs next build internally with Vercel env vars
      - name: Build project with Vercel
        run: vercel build --token=${{ env.VERCEL_TOKEN }} 2>&1 | tee .build-output.txt

      - name: Deploy PR preview
        id: vercel_preview
        shell: bash
        run: |
          set -euo pipefail
          echo "🚀 Deploying PR preview..."
          out="$(vercel deploy --prebuilt --token="${{ env.VERCEL_TOKEN }}")"
          echo "$out"
          url="$(printf '%s\n' "$out" | tail -n 1)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Extract bundle size report
        id: bundle
        run: |
          python3 - <<'EOF'
          import re

          with open('.build-output.txt') as f:
              content = f.read()

          # Match the Next.js route/page size table
          match = re.search(r'(Route \(app\)|Route \(pages\)|Page\s+)[\s\S]*?(?=\ninfo |\Z)', content)
          if match:
              lines = match.group(0).split('\n')[:60]
              print('\n'.join(lines))
          else:
              print('Bundle size data not available in build output.')
          EOF
          ) > .bundle-report.txt 2>&1 || echo "Could not extract bundle size." > .bundle-report.txt

      - name: Post PR comment (preview URL + bundle size)
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.vercel_preview.outputs.url }}
        with:
          script: |
            const fs = require('fs');
            const bundleReport = fs.readFileSync('.bundle-report.txt', 'utf8').trim();
            const previewUrl = process.env.PREVIEW_URL;

            const body = [
              '## 🚀 PR Preview Deployment',
              '',
              '| | |',
              '|---|---|',
              `| **Preview URL** | ${previewUrl} |`,
              '| **Status** | ✅ Deployed |',
              '',
              '<details>',
              '<summary>📦 Bundle Size Report</summary>',
              '',
              '```',
              bundleReport,
              '```',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('PR Preview Deployment')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Run Lighthouse CI (informational)
        uses: treosh/lighthouse-ci-action@v11
        continue-on-error: true
        with:
          urls: |
            ${{ steps.vercel_preview.outputs.url }}
            ${{ steps.vercel_preview.outputs.url }}/auth/signin
          uploadArtifacts: true
          temporaryPublicStorage: true
