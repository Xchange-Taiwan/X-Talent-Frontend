name: Security & Dependency Check

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    name: Security Audit & Unused Dependencies

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (fail on critical only)
        id: audit
        run: |
          # pnpm audit exits 1 for ANY vulnerability regardless of --audit-level.
          # Parse JSON to check critical count only — known high advisories in
          # next@14 require a Next.js 15 migration and are tracked separately.
          pnpm audit --json > audit-output.json 2>&1 || true

          CRITICAL=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('audit-output.json'))
              v = d.get('metadata', {}).get('vulnerabilities', {})
              print(v.get('critical', 0))
          except Exception:
              print(0)
          ")

          HIGH=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('audit-output.json'))
              v = d.get('metadata', {}).get('vulnerabilities', {})
              print(v.get('high', 0))
          except Exception:
              print(0)
          ")

          TOTAL=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('audit-output.json'))
              v = d.get('metadata', {}).get('vulnerabilities', {})
              print(v.get('total', 0))
          except Exception:
              print(0)
          ")

          echo "critical=${CRITICAL}" >> $GITHUB_OUTPUT
          echo "high=${HIGH}" >> $GITHUB_OUTPUT
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT

          if [ "$CRITICAL" -gt 0 ]; then
            echo "result=failed" >> $GITHUB_OUTPUT
            echo "❌ Critical vulnerabilities detected: ${CRITICAL}"
          else
            echo "result=passed" >> $GITHUB_OUTPUT
            echo "✅ No critical vulnerabilities (high: ${HIGH}, total: ${TOTAL})"
          fi

      - name: Check unused dependencies
        id: depcheck
        run: |
          output=$(npx depcheck \
            --ignores="@types/*,eslint-*,prettier-*,postcss,autoprefixer,tailwindcss,husky,lint-staged,storybook,@storybook/*,tsconfig-paths-webpack-plugin,tailwindcss-animate" \
            2>&1) || true
          echo "$output"
          if echo "$output" | grep -qE "^Unused (dependencies|devDependencies)"; then
            echo "unused_found=true" >> $GITHUB_OUTPUT
            {
              echo "unused_list<<EOF"
              echo "$output" | grep -A 999 "Unused"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "unused_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🔒 Security & Dependency Check"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            if [[ "${{ steps.audit.outputs.result }}" == "failed" ]]; then
              echo "| pnpm audit | ❌ Critical vulnerabilities found (${{ steps.audit.outputs.critical }}) |"
            elif [[ "${{ steps.audit.outputs.high }}" -gt 0 ]]; then
              echo "| pnpm audit | ⚠️ No critical, but ${{ steps.audit.outputs.high }} high (total: ${{ steps.audit.outputs.total }}) |"
            else
              echo "| pnpm audit | ✅ No critical or high vulnerabilities (total: ${{ steps.audit.outputs.total }}) |"
            fi
            if [[ "${{ steps.depcheck.outputs.unused_found }}" == "true" ]]; then
              echo "| Unused Dependencies | ❌ Found (see details below) |"
            else
              echo "| Unused Dependencies | ✅ None detected |"
            fi
            if [[ "${{ steps.depcheck.outputs.unused_found }}" == "true" ]]; then
              echo ""
              echo "### ⚠️ Unused Dependencies (informational — may include false positives)"
              echo '```'
              echo "${{ steps.depcheck.outputs.unused_list }}"
              echo '```'
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Fail on critical vulnerabilities
        if: steps.audit.outputs.result == 'failed'
        run: |
          echo "❌ Build failed: critical vulnerabilities must be resolved before merging."
          exit 1

      - name: Fail on unused dependencies
        if: steps.depcheck.outputs.unused_found == 'true'
        run: |
          echo "❌ Build failed: unused dependencies detected. Remove them or add to the ignore list."
          exit 1
