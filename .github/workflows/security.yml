name: Security & Dependency Check

on:
  pull_request:
    branches: ['**']
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  security:
    runs-on: ubuntu-latest
    name: Security Audit & Unused Dependencies

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit (fail on high/critical)
        id: audit
        run: |
          # pnpm audit exits 1 for ANY vulnerability regardless of --audit-level.
          # Use --json and parse high/critical counts explicitly.
          pnpm audit --json > audit-output.json 2>&1 || true

          HIGH=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('audit-output.json'))
              v = d.get('metadata', {}).get('vulnerabilities', {})
              print(v.get('high', 0) + v.get('critical', 0))
          except Exception:
              print(0)
          ")

          TOTAL=$(python3 -c "
          import json, sys
          try:
              d = json.load(open('audit-output.json'))
              v = d.get('metadata', {}).get('vulnerabilities', {})
              print(v.get('total', 0))
          except Exception:
              print(0)
          ")

          echo "high_critical=${HIGH}" >> $GITHUB_OUTPUT
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT

          if [ "$HIGH" -gt 0 ]; then
            echo "result=failed" >> $GITHUB_OUTPUT
            echo "❌ High/Critical vulnerabilities detected: ${HIGH}"
          else
            echo "result=passed" >> $GITHUB_OUTPUT
            echo "✅ No high/critical vulnerabilities (total advisories: ${TOTAL})"
          fi

      - name: Check unused dependencies (informational)
        id: depcheck
        continue-on-error: true
        run: |
          output=$(npx depcheck \
            --ignores="@types/*,eslint-*,prettier-*,postcss,autoprefixer,tailwindcss,husky,lint-staged,storybook,@storybook/*,tsconfig-paths-webpack-plugin,tailwindcss-animate" \
            2>&1) || true
          echo "$output"
          if echo "$output" | grep -qE "^Unused (dependencies|devDependencies)"; then
            echo "unused_found=true" >> $GITHUB_OUTPUT
            {
              echo "unused_list<<EOF"
              echo "$output" | grep -A 999 "Unused"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "unused_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## 🔒 Security & Dependency Check"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            if [[ "${{ steps.audit.outputs.result }}" == "failed" ]]; then
              echo "| pnpm audit | ❌ High/Critical vulnerabilities found |"
            else
              echo "| pnpm audit | ✅ No high/critical vulnerabilities (total advisories: ${{ steps.audit.outputs.total }}) |"
            fi
            if [[ "${{ steps.depcheck.outputs.unused_found }}" == "true" ]]; then
              echo "| Unused Dependencies | ⚠️ Found (informational) |"
            else
              echo "| Unused Dependencies | ✅ None detected |"
            fi
            if [[ "${{ steps.depcheck.outputs.unused_found }}" == "true" ]]; then
              echo ""
              echo "### ⚠️ Unused Dependencies (informational — may include false positives)"
              echo '```'
              echo "${{ steps.depcheck.outputs.unused_list }}"
              echo '```'
            fi
          } >> $GITHUB_STEP_SUMMARY

      - name: Fail on security vulnerabilities
        if: steps.audit.outputs.result == 'failed'
        run: exit 1
